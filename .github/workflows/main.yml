name: .NET Console App Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore "./YourProjectName.csproj"

      - name: Build project
        run: dotnet build "./YourProjectName.csproj" --configuration Release

      - name: Run application
        run: dotnet run --project "./YourProjectName.csproj"

      - name: Build project
        run: dotnet build --configuration Release

      - name: Run application
        run: dotnet run
